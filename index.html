<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Giỏi Tiếng Việt - Chữ Và Số</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff7675;
            --secondary: #74b9ff;
            --bg: #f0f7ff;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Menu chuyển đổi */
        .nav-menu {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            padding: 10px 25px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            background: white;
            color: #636e72;
            box-shadow: 0 4px 0 #dfe4ea;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 0 #d63031;
            transform: translateY(-2px);
        }

        h1 { color: #2d3436; margin: 10px 0; font-size: 2rem; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            max-width: 1000px;
            width: 100%;
        }

        /* Thẻ học tập */
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 0 #dfe4ea;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #dfe4ea;
        }

        .main-symbol {
            font-size: 4rem;
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .sub-text {
            font-size: 1rem;
            color: #636e72;
            background: #f1f2f6;
            padding: 3px 10px;
            border-radius: 10px;
        }

        .counting-objects {
            font-size: 1.2rem;
            margin-top: 5px;
            display: block;
        }

        /* Hiệu ứng đang đọc */
        .speaking {
            background: #fff9db !important;
            border-color: #fab1a0 !important;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="switchTab('abc')">🔠 Chữ Cái</button>
        <button class="nav-btn" onclick="switchTab('123')">🔢 Tập Đếm</button>
    </div>

    <h1 id="title">BÉ HỌC CHỮ CÁI</h1>

    <div id="abc-grid" class="container"></div>

    <div id="123-grid" class="container hidden"></div>

    <script>
        const abcData = [
            { l: 'a', s: 'a', w: 'con cá.' }, { l: 'ă', s: 'á', w: 'con rắn.' },
            { l: 'â', s: 'ớ', w: 'cái ấm.' }, { l: 'b', s: 'bờ', w: 'con bò.' },
            { l: 'c', s: 'cờ', w: 'con cua.' }, { l: 'd', s: 'dờ', w: 'con dế.' },
            { l: 'đ', s: 'đờ', w: 'đu đủ.' }, { l: 'e', s: 'e', w: 'xe bé.' },
            { l: 'ê', s: 'ê', w: 'con bê.' }, { l: 'g', s: 'gờ', w: 'con gà.' },
            { l: 'h', s: 'hờ', w: 'hoa hồng.' }, { l: 'i', s: 'y', w: 'viên bi.' },
            { l: 'k', s: 'ca', w: 'cái ca.' }, { l: 'l', s: 'lờ', w: 'quả lê.' },
            { l: 'm', s: 'mờ', w: 'con mèo.' }, { l: 'n', s: 'nờ', w: 'cái nơ.' },
            { l: 'o', s: 'o', w: 'quả cọ.' }, { l: 'ô', s: 'ô', w: 'cái ô.' },
            { l: 'ơ', s: 'ơ', w: 'lá cờ.' }, { l: 'p', s: 'pờ', w: 'đèn pin.' },
            { l: 'q', s: 'quờ', w: 'quả quýt.' }, { l: 'r', s: 'rờ', w: 'con rùa.' },
            { l: 's', s: 'xờ', w: 'ngôi sao.' }, { l: 't', s: 'tờ', w: 'con tôm.' },
            { l: 'u', s: 'u', w: 'cái tủ.' }, { l: 'ư', s: 'ư', w: 'lá thư.' },
            { l: 'v', s: 'vờ', w: 'con voi.' }, { l: 'x', s: 'xờ', w: 'xe đạp.' },
            { l: 'y', s: 'y', w: 'cái yếm.' }
        ];

        const numData = [
            { l: '1', s: 'Số một.', w: 'Một quả táo.', icon: '🍎' },
            { l: '2', s: 'Số hai.', w: 'Hai con vịt.', icon: '🐥' },
            { l: '3', s: 'Số ba.', w: 'Ba bông hoa.', icon: '🌸' },
            { l: '4', s: 'Số bốn.', w: 'Bốn chiếc xe.', icon: '🚗' },
            { l: '5', s: 'Số năm.', w: 'Năm ngôi sao.', icon: '⭐' },
            { l: '6', s: 'Số sáu.', w: 'Sáu viên kẹo.', icon: '🍭' },
            { l: '7', s: 'Số bảy.', w: 'Bảy quả bóng.', icon: '🎈' },
            { l: '8', s: 'Số tám.', w: 'Tám quả dâu.', icon: '🍓' },
            { l: '9', s: 'Số chín.', w: 'Chín con ong.', icon: '🐝' },
            { l: '10', s: 'Số mười.', w: 'Mười điểm mười.', icon: '💯' }
        ];

        function init() {
            renderGrid('abc-grid', abcData, 'abc');
            renderGrid('123-grid', numData, '123');
        }

        function renderGrid(id, data, type) {
            const grid = document.getElementById(id);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const color = getRandomColor();
                card.innerHTML = `
                    <span class="main-symbol" style="color: ${color}">${item.l}</span>
                    <span class="sub-text">${item.w.replace('.','')}</span>
                    ${type === '123' ? `<span class="counting-objects">${item.icon.repeat(parseInt(item.l) > 5 ? 5 : item.l)}</span>` : ''}
                `;
                card.onclick = () => {
                    playVoice(item, card);
                };
                grid.appendChild(card);
            });
        }

        function playVoice(item, card) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();

            card.classList.add('speaking');
            
            // "Mẹo" thuần Việt: Thêm khoảng nghỉ bằng dấu phẩy và dấu chấm
            const text = `${item.s}, , , , ${item.w}`;
            const utterance = new SpeechSynthesisUtterance(text);
            
            utterance.lang = 'vi-VN';
            utterance.rate = 0.8;  // Đọc chậm
            utterance.pitch = 1.2; // Giọng cao cho trẻ em dễ nghe

            utterance.onend = () => card.classList.remove('speaking');
            window.speechSynthesis.speak(utterance);
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            if (tab === 'abc') {
                document.getElementById('abc-grid').classList.remove('hidden');
                document.getElementById('123-grid').classList.add('hidden');
                document.getElementById('title').innerText = 'BÉ HỌC CHỮ CÁI';
            } else {
                document.getElementById('abc-grid').classList.add('hidden');
                document.getElementById('123-grid').classList.remove('hidden');
                document.getElementById('title').innerText = 'BÉ TẬP ĐẾM SỐ';
            }
        }

        function getRandomColor() {
            const colors = ['#ff7675', '#0984e3', '#6c5ce7', '#00b894', '#d63031', '#e84393'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        init();
    </script>
</body>
</html>
