<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Chữ Cái & Từ Vựng</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #eef2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #2d3436; font-size: 2.2rem; margin-bottom: 5px; text-transform: uppercase; }
        .sub-title { color: #636e72; margin-bottom: 30px; font-weight: 500; }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #74b9ff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card:active { transform: scale(0.95); }

        .letter-box {
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1;
        }

        .word-box {
            font-size: 1.2rem;
            color: #636e72;
            background: #f1f2f6;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        /* Màu sắc sinh động */
        .card:nth-child(even) .letter-box { color: #ff7675; }
        .card:nth-child(odd) .letter-box { color: #0984e3; }
        .card:nth-child(3n) .letter-box { color: #6c5ce7; }
        .card:nth-child(4n) .letter-box { color: #00b894; }

        /* Hiệu ứng đang đọc */
        .speaking {
            animation: pulse 1s infinite;
            background: #fff9db !important;
            border-color: #fab1a0 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🅰️ BÉ GIỎI TIẾNG VIỆT</h1>
    <p class="sub-title">Chạm vào chữ cái để nghe cô đọc âm và từ nhé!</p>

    <div class="alphabet-grid" id="grid"></div>

    <script>
        const alphabetData = [
            { l: 'a', s: 'a', w: 'con cá' },      { l: 'ă', s: 'á', w: 'con rắn' },
            { l: 'â', s: 'ớ', w: 'cái ấm' },     { l: 'b', s: 'bờ', w: 'con bò' },
            { l: 'c', s: 'cờ', w: 'con cá' },     { l: 'd', s: 'dờ', w: 'con dế' },
            { l: 'đ', s: 'đờ', w: 'đu đủ' },     { l: 'e', s: 'e', w: 'xe bé' },
            { l: 'ê', s: 'ê', w: 'con bê' },      { l: 'g', s: 'gờ', w: 'con gà' },
            { l: 'h', s: 'hờ', w: 'hoa hồng' },   { l: 'i', s: 'i', w: 'viên bi' },
            { l: 'k', s: 'ca', w: 'cái ca' },     { l: 'l', s: 'lờ', w: 'quả lê' },
            { l: 'm', s: 'mờ', w: 'con mèo' },    { l: 'n', s: 'nờ', w: 'cái nơ' },
            { l: 'o', s: 'o', w: 'con bò' },      { l: 'ô', s: 'ô', w: 'cái ô' },
            { l: 'ơ', s: 'ơ', w: 'cái nơ' },      { l: 'p', s: 'pờ', w: 'đèn pin' },
            { l: 'q', s: 'quờ', w: 'quả quít' },  { l: 'r', s: 'rờ', w: 'con rùa' },
            { l: 's', s: 'sờ', w: 'ngôi sao' },   { l: 't', s: 'tờ', w: 'con tôm' },
            { l: 'u', s: 'u', w: 'cái tủ' },      { l: 'ư', s: 'ư', w: 'lá thư' },
            { l: 'v', s: 'vờ', w: 'con voi' },    { l: 'x', s: 'xờ', w: 'xe đạp' },
            { l: 'y', s: 'i', w: 'cái yếm' }
        ];

        const grid = document.getElementById('grid');

        alphabetData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="letter-box">${item.l}</div>
                <div class="word-box">${item.w}</div>
            `;

            card.onclick = () => {
                // Xóa trạng thái đang đọc cũ
                document.querySelectorAll('.card').forEach(c => c.classList.remove('speaking'));
                
                // Thêm hiệu ứng cho thẻ đang được nhấn
                card.classList.add('speaking');
                
                // Nội dung đọc: "Âm... Từ"
                const textToSpeak = `${item.s}...... ${item.w}`;
                speak(textToSpeak, card);
            };

            grid.appendChild(card);
        });

        function speak(text, cardElement) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Dừng các âm thanh khác

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.7;  // Đọc chậm rãi
                utterance.pitch = 1.1; // Giọng hơi cao một chút để vui tươi

                utterance.onend = () => {
                    cardElement.classList.remove('speaking');
                };

                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
