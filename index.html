<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Quicksa<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Chữ Cái & Từ Vựng</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #eef2f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { color: #2d3436; font-size: 2.2rem; margin-bottom: 5px; text-transform: uppercase; }
        .sub-title { color: #636e72; margin-bottom: 30px; font-weight: 500; }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #74b9ff;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card:active { transform: scale(0.95); }

        .letter-box {
            font-size: 4.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1;
        }

        .word-box {
            font-size: 1.2rem;
            color: #636e72;
            background: #f1f2f6;
            padding: 5px 15px;
            border-radius: 15px;
            display: inline-block;
        }

        /* Màu sắc sinh động */
        .card:nth-child(even) .letter-box { color: #ff7675; }
        .card:nth-child(odd) .letter-box { color: #0984e3; }
        .card:nth-child(3n) .letter-box { color: #6c5ce7; }
        .card:nth-child(4n) .letter-box { color: #00b894; }

        /* Hiệu ứng đang đọc */
        .speaking {
            animation: pulse 1s infinite;
            background: #fff9db !important;
            border-color: #fab1a0 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🅰️ BÉ GIỎI TIẾNG VIỆT</h1>
    <p class="sub-title">Chạm vào chữ cái để nghe cô đọc âm và từ nhé!</p>

    <div class="alphabet-grid" id="grid"></div>

    <script>
        const alphabetData = [
            { l: 'a', s: 'a', w: 'con cá' },      { l: 'ă', s: 'á', w: 'con rắn' },
            { l: 'â', s: 'ớ', w: 'cái ấm' },     { l: 'b', s: 'bờ', w: 'con bò' },
            { l: 'c', s: 'cờ', w: 'con cá' },     { l: 'd', s: 'dờ', w: 'con dế' },
            { l: 'đ', s: 'đờ', w: 'đu đủ' },     { l: 'e', s: 'e', w: 'xe bé' },
            { l: 'ê', s: 'ê', w: 'con bê' },      { l: 'g', s: 'gờ', w: 'con gà' },
            { l: 'h', s: 'hờ', w: 'hoa hồng' },   { l: 'i', s: 'i', w: 'viên bi' },
            { l: 'k', s: 'ca', w: 'cái ca' },     { l: 'l', s: 'lờ', w: 'quả lê' },
            { l: 'm', s: 'mờ', w: 'con mèo' },    { l: 'n', s: 'nờ', w: 'cái nơ' },
            { l: 'o', s: 'o', w: 'con bò' },      { l: 'ô', s: 'ô', w: 'cái ô' },
            { l: 'ơ', s: 'ơ', w: 'cái nơ' },      { l: 'p', s: 'pờ', w: 'đèn pin' },
            { l: 'q', s: 'quờ', w: 'quả quít' },  { l: 'r', s: 'rờ', w: 'con rùa' },
            { l: 's', s: 'sờ', w: 'ngôi sao' },   { l: 't', s: 'tờ', w: 'con tôm' },
            { l: 'u', s: 'u', w: 'cái tủ' },      { l: 'ư', s: 'ư', w: 'lá thư' },
            { l: 'v', s: 'vờ', w: 'con voi' },    { l: 'x', s: 'xờ', w: 'xe đạp' },
            { l: 'y', s: 'i', w: 'cái yếm' }
        ];

        const grid = document.getElementById('grid');

        alphabetData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="letter-box">${item.l}</div>
                <div class="word-box">${item.w}</div>
            `;

            card.onclick = () => {
                // Xóa trạng thái đang đọc cũ
                document.querySelectorAll('.card').forEach(c => c.classList.remove('speaking'));
                
                // Thêm hiệu ứng cho thẻ đang được nhấn
                card.classList.add('speaking');
                
                // Nội dung đọc: "Âm... Từ"
                const textToSpeak = `${item.s}...... ${item.w}`;
                speak(textToSpeak, card);
            };

            grid.appendChild(card);
        });

        function speak(text, cardElement) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Dừng các âm thanh khác

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.7;  // Đọc chậm rãi
                utterance.pitch = 1.1; // Giọng hơi cao một chút để vui tươi

                utterance.onend = () => {
                    cardElement.classList.remove('speaking');
                };

                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>nd:wght@600;700&display=swap" rel="stylesheet">

        /* Menu chuyển đổi */

<body>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="switchTab('abc')">🔠 Chữ Cái</button>
        <button class="nav-btn" onclick="switchTab('123')">🔢 Tập Đếm</button>
    </div>

    <h1 id="title">BÉ HỌC CHỮ CÁI</h1>

    <div id="abc-grid" class="container"></div>

    <div id="123-grid" class="container hidden"></div>

    <script>
        const abcData = [
            { l: 'a', s: 'a', w: 'con cá.' }, { l: 'ă', s: 'á', w: 'con rắn.' },
            { l: 'â', s: 'ớ', w: 'cái ấm.' }, { l: 'b', s: 'bờ', w: 'con bò.' },
            { l: 'c', s: 'cờ', w: 'con cua.' }, { l: 'd', s: 'dờ', w: 'con dế.' },
            { l: 'đ', s: 'đờ', w: 'đu đủ.' }, { l: 'e', s: 'e', w: 'xe bé.' },
            { l: 'ê', s: 'ê', w: 'con bê.' }, { l: 'g', s: 'gờ', w: 'con gà.' },
            { l: 'h', s: 'hờ', w: 'hoa hồng.' }, { l: 'i', s: 'y', w: 'viên bi.' },
            { l: 'k', s: 'ca', w: 'cái ca.' }, { l: 'l', s: 'lờ', w: 'quả lê.' },
            { l: 'm', s: 'mờ', w: 'con mèo.' }, { l: 'n', s: 'nờ', w: 'cái nơ.' },
            { l: 'o', s: 'o', w: 'quả cọ.' }, { l: 'ô', s: 'ô', w: 'cái ô.' },
            { l: 'ơ', s: 'ơ', w: 'lá cờ.' }, { l: 'p', s: 'pờ', w: 'đèn pin.' },
            { l: 'q', s: 'quờ', w: 'quả quýt.' }, { l: 'r', s: 'rờ', w: 'con rùa.' },
            { l: 's', s: 'xờ', w: 'ngôi sao.' }, { l: 't', s: 'tờ', w: 'con tôm.' },
            { l: 'u', s: 'u', w: 'cái tủ.' }, { l: 'ư', s: 'ư', w: 'lá thư.' },
            { l: 'v', s: 'vờ', w: 'con voi.' }, { l: 'x', s: 'xờ', w: 'xe đạp.' },
            { l: 'y', s: 'y', w: 'cái yếm.' }
        ];

        const numData = [
            { l: '1', s: 'Số một.', w: 'Một quả táo.', icon: '🍎' },
            { l: '2', s: 'Số hai.', w: 'Hai con vịt.', icon: '🐥' },
            { l: '3', s: 'Số ba.', w: 'Ba bông hoa.', icon: '🌸' },
            { l: '4', s: 'Số bốn.', w: 'Bốn chiếc xe.', icon: '🚗' },
            { l: '5', s: 'Số năm.', w: 'Năm ngôi sao.', icon: '⭐' },
            { l: '6', s: 'Số sáu.', w: 'Sáu viên kẹo.', icon: '🍭' },
            { l: '7', s: 'Số bảy.', w: 'Bảy quả bóng.', icon: '🎈' },
            { l: '8', s: 'Số tám.', w: 'Tám quả dâu.', icon: '🍓' },
            { l: '9', s: 'Số chín.', w: 'Chín con ong.', icon: '🐝' },
            { l: '10', s: 'Số mười.', w: 'Mười điểm mười.', icon: '💯' }
        ];

        function init() {
            renderGrid('abc-grid', abcData, 'abc');
            renderGrid('123-grid', numData, '123');
        }

        function renderGrid(id, data, type) {
            const grid = document.getElementById(id);
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const color = getRandomColor();
                card.innerHTML = `
                    <span class="main-symbol" style="color: ${color}">${item.l}</span>
                    <span class="sub-text">${item.w.replace('.','')}</span>
                    ${type === '123' ? `<span class="counting-objects">${item.icon.repeat(parseInt(item.l) > 5 ? 5 : item.l)}</span>` : ''}
                `;
                card.onclick = () => {
                    playVoice(item, card);
                };
                grid.appendChild(card);
            });
        }

        function playVoice(item, card) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();

            card.classList.add('speaking');
            
            // "Mẹo" thuần Việt: Thêm khoảng nghỉ bằng dấu phẩy và dấu chấm
            const text = `${item.s}, , , , ${item.w}`;
            const utterance = new SpeechSynthesisUtterance(text);
            
            utterance.lang = 'vi-VN';
            utterance.rate = 0.8;  // Đọc chậm
            utterance.pitch = 1.2; // Giọng cao cho trẻ em dễ nghe

            utterance.onend = () => card.classList.remove('speaking');
            window.speechSynthesis.speak(utterance);
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            if (tab === 'abc') {
                document.getElementById('abc-grid').classList.remove('hidden');
                document.getElementById('123-grid').classList.add('hidden');
                document.getElementById('title').innerText = 'BÉ HỌC CHỮ CÁI';
            } else {
                document.getElementById('abc-grid').classList.add('hidden');
                document.getElementById('123-grid').classList.remove('hidden');
                document.getElementById('title').innerText = 'BÉ TẬP ĐẾM SỐ';
            }
        }

        function getRandomColor() {
            const colors = ['#ff7675', '#0984e3', '#6c5ce7', '#00b894', '#d63031', '#e84393'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        init();
    </script>
</body>
