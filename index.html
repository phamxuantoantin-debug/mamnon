<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Học Chữ Cái - Tiếng Việt Chuẩn</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0fdf4; /* Màu xanh lá nhẹ dịu mắt */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 { color: #15803d; font-size: 2.5rem; margin-bottom: 5px; text-shadow: 1px 1px white; }
        .sub-title { color: #166534; margin-bottom: 30px; font-size: 1.2rem; }

        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            max-width: 1100px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #dcfce7;
            transition: all 0.2s ease;
            border: 2px solid #f0fdf4;
        }

        .card:hover { transform: translateY(-5px); }
        .card:active { transform: translateY(4px); box-shadow: 0 2px 0 #dcfce7; }

        .letter {
            font-size: 4.5rem;
            font-weight: 700;
            color: #16a34a;
            line-height: 1;
            margin-bottom: 8px;
            display: block;
        }

        .word {
            font-size: 1.1rem;
            color: #4b5563;
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
        }

        /* Hiệu ứng khi đang phát âm */
        .speaking {
            background: #fef9c3 !important;
            border-color: #fde047 !important;
        }

        /* Màu sắc ngẫu nhiên cho chữ cái thêm sinh động */
        .card:nth-child(5n+1) .letter { color: #ef4444; }
        .card:nth-child(5n+2) .letter { color: #3b82f6; }
        .card:nth-child(5n+3) .letter { color: #f59e0b; }
        .card:nth-child(5n+4) .letter { color: #8b5cf6; }
        .card:nth-child(5n+5) .letter { color: #10b981; }
    </style>
</head>
<body>

    <h1>🅰️ BÉ HỌC CHỮ CÁI</h1>
    <p class="sub-title">Bé chạm vào chữ để nghe cô đọc âm và từ nhé!</p>

    <div class="alphabet-grid" id="grid"></div>

    <script>
        const alphabetData = [
            { l: 'a', s: 'a', w: 'con cá' },      { l: 'ă', s: 'á', w: 'con rắn' },
            { l: 'â', s: 'ớ', w: 'cái ấm' },     { l: 'b', s: 'bờ', w: 'con bò' },
            { l: 'c', s: 'cờ', w: 'con cua' },    { l: 'd', s: 'dờ', w: 'con dế' },
            { l: 'đ', s: 'đờ', w: 'đu đủ' },     { l: 'e', s: 'e', w: 'xe bé' },
            { l: 'ê', s: 'ê', w: 'con bê' },      { l: 'g', s: 'gờ', w: 'con gà' },
            { l: 'h', s: 'hờ', w: 'hoa hồng' },   { l: 'i', s: 'i', w: 'viên bi' },
            { l: 'k', s: 'ca', w: 'cái ca' },     { l: 'l', s: 'lờ', w: 'quả lê' },
            { l: 'm', s: 'mờ', w: 'con mèo' },    { l: 'n', s: 'nờ', w: 'cái nơ' },
            { l: 'o', s: 'o', w: 'quả cọ' },      { l: 'ô', s: 'ô', w: 'cái ô' },
            { l: 'ơ', s: 'ơ', w: 'lá cờ' },      { l: 'p', s: 'pờ', w: 'đèn pin' },
            { l: 'q', s: 'quờ', w: 'quả quýt' },  { l: 'r', s: 'rờ', w: 'con rùa' },
            { l: 's', s: 'xờ', w: 'ngôi sao' },   { l: 't', s: 'tờ', w: 'con tôm' },
            { l: 'u', s: 'u', w: 'cái tủ' },      { l: 'ư', s: 'ư', w: 'lá thư' },
            { l: 'v', s: 'vờ', w: 'con voi' },    { l: 'x', s: 'xờ', w: 'xe đạp' },
            { l: 'y', s: 'y', w: 'cái yếm' }
        ];

        const grid = document.getElementById('grid');

        alphabetData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="letter">${item.l}</span>
                <span class="word">${item.w}</span>
            `;

            card.onclick = () => {
                // Hủy phát âm cũ nếu bé bấm nhanh
                window.speechSynthesis.cancel();
                
                // Hiệu ứng thị giác
                document.querySelectorAll('.card').forEach(c => c.classList.remove('speaking'));
                card.classList.add('speaking');

                // Tạo nội dung đọc có khoảng nghỉ ngắt quãng để máy đọc rõ dấu
                const textToSpeak = `${item.s} , , , , , , ${item.w}`;
                playVietnameseVoice(textToSpeak, card);
            };

            grid.appendChild(card);
        });

        function playVietnameseVoice(text, cardElement) {
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Tìm giọng đọc tiếng Việt tốt nhất
            const voices = window.speechSynthesis.getVoices();
            const viVoice = voices.find(v => v.lang.includes('vi') || v.name.includes('Vietnamese'));

            if (viVoice) {
                utterance.voice = viVoice;
            }

            utterance.lang = 'vi-VN';
            utterance.rate = 0.75; // Đọc chậm để rõ dấu thanh
            utterance.pitch = 1.1; // Giọng hơi cao một chút cho thân thiện

            utterance.onend = () => {
                cardElement.classList.remove('speaking');
            };

            window.speechSynthesis.speak(utterance);
        }

        // Kích hoạt nạp giọng nói (Quan trọng cho Chrome)
        window.speechSynthesis.onvoiceschanged = () => {
            console.log("Đã nạp giọng đọc tiếng Việt");
        };
    </script>
</body>
</html>
